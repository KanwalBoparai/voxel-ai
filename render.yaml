# Render Blueprint — deploys Voxel AI as a public web service.
#
# How to use:
#   1. Push this repo to GitHub.
#   2. Go to https://dashboard.render.com → New → Blueprint.
#   3. Connect this repo. Render reads this file and creates the service.
#   4. In the dashboard, fill in the secret env vars marked "sync: false" below
#      (ANTHROPIC_API_KEY, VAPI_*, GOOGLE_*).
#   5. After the first deploy, copy the service URL (e.g.
#      https://voxel-ai.onrender.com) and set APP_BASE_URL to it, then point
#      your Vapi tools at {APP_BASE_URL}/tools/vapi.
#
# Business details (name, industry, services, hours, FAQs) come from
# config/business.json, which is committed with the repo — edit it there or via
# the dashboard's AI Settings page.
#
# Note: the free plan has an ephemeral filesystem, so the local SQLite file
# resets on redeploy. That's fine — the real CRM (Google Sheets) and calendar
# (Google Calendar) live externally. For persistent SQLite, add a paid disk.

services:
  - type: web
    name: voxel-ai
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"

      # --- Claude (required — the agent brain) ---
      - key: ANTHROPIC_API_KEY
        sync: false                    # set this secret in the dashboard
      - key: ANTHROPIC_MODEL
        value: claude-opus-4-8

      # --- Vapi (for real phone calls) ---
      - key: VAPI_API_KEY
        sync: false
      - key: VAPI_PHONE_NUMBER_ID
        sync: false

      # --- Google Calendar + Sheets CRM ---
      # Paste the FULL service-account JSON as a single value for this one.
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: GOOGLE_CALENDAR_ID
        sync: false
      - key: GOOGLE_SHEET_ID
        sync: false

      # --- Public base URL (set to this service's URL after first deploy) ---
      - key: APP_BASE_URL
        sync: false
